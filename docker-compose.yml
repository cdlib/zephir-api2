services:
  zephir-api:
    build:
      context: .
      target: production
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      # Required
      - FLASK_ENV
      - APP_PORT
      - LOG_LEVEL
  
      # One of the following must be set
      - DATABASE_URI

      - DATABASE_CREDENTIALS_SECRET_NAME
      - AWS_DEFAULT_REGION
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN

      - DB_USERNAME
      - DB_PASSWORD
      - DB_HOST
      - DB_DATABASE